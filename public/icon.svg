<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="55%">
      <stop offset="0%" stop-color="#0a0a12"/>
      <stop offset="100%" stop-color="#000000"/>
    </radialGradient>
    <linearGradient id="orbitGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00b4ff" stop-opacity="0.9"/>
      <stop offset="50%" stop-color="#0088dd" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#ff6b2b" stop-opacity="0.9"/>
    </linearGradient>
    <linearGradient id="orbit2Grad" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ff6b2b" stop-opacity="0.8"/>
      <stop offset="50%" stop-color="#ff8844" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#00b4ff" stop-opacity="0.8"/>
    </linearGradient>
    <linearGradient id="pGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#d0e8ff"/>
    </linearGradient>
    <filter id="glow1" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="8"/>
    </filter>
    <filter id="glow2" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="12"/>
    </filter>
    <filter id="glowP" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="4"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1024" height="1024" rx="224" fill="url(#bg)"/>

  <!-- Subtle radial highlight -->
  <circle cx="512" cy="480" r="300" fill="#00b4ff" opacity="0.03"/>

  <!-- Orbit ring 1 (tilted ellipse) - glow layer -->
  <ellipse cx="512" cy="512" rx="340" ry="120"
    transform="rotate(-25 512 512)"
    fill="none" stroke="url(#orbitGrad)" stroke-width="6"
    filter="url(#glow1)" opacity="0.6"/>
  <!-- Orbit ring 1 - sharp layer -->
  <ellipse cx="512" cy="512" rx="340" ry="120"
    transform="rotate(-25 512 512)"
    fill="none" stroke="url(#orbitGrad)" stroke-width="3.5" opacity="0.9"/>

  <!-- Orbit ring 2 (different tilt) - glow layer -->
  <ellipse cx="512" cy="512" rx="300" ry="100"
    transform="rotate(35 512 512)"
    fill="none" stroke="url(#orbit2Grad)" stroke-width="5"
    filter="url(#glow1)" opacity="0.5"/>
  <!-- Orbit ring 2 - sharp layer -->
  <ellipse cx="512" cy="512" rx="300" ry="100"
    transform="rotate(35 512 512)"
    fill="none" stroke="url(#orbit2Grad)" stroke-width="2.5" opacity="0.8"/>

  <!-- Orbit node (blue dot) -->
  <circle cx="260" cy="390" r="14" fill="#00b4ff" filter="url(#glow2)" opacity="0.8"/>
  <circle cx="260" cy="390" r="8" fill="#00d4ff"/>

  <!-- Orbit node (orange dot) -->
  <circle cx="750" cy="620" r="14" fill="#ff6b2b" filter="url(#glow2)" opacity="0.8"/>
  <circle cx="750" cy="620" r="8" fill="#ff8844"/>

  <!-- P letter - glow -->
  <text x="480" y="600" font-family="'Helvetica Neue',Arial,sans-serif"
    font-size="420" font-weight="900" fill="#ffffff"
    filter="url(#glowP)" opacity="0.3">P</text>
  <!-- P letter - main -->
  <text x="480" y="600" font-family="'Helvetica Neue',Arial,sans-serif"
    font-size="420" font-weight="900" fill="url(#pGrad)"
    opacity="0.95">P</text>
</svg>
